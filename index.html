<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tâche 5 — Pseudo-mots voyellés</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #faf7f2;
    --surface:   #ffffff;
    --border:    #ddd0bb;
    --accent:    #8b5e3c;
    --accent2:   #5c8a6b;
    --text:      #2c1f10;
    --muted:     #9c8672;
    --correct:   #3a7d5a;
    --wrong:     #c0392b;
    --r: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── SCREENS ─────────────────────────────────────── */
  .screen { display: none; width: 100vw; min-height: 100vh; align-items: center; justify-content: center; flex-direction: column; padding: 24px; }
  .screen.active { display: flex; }

  /* ── SETUP SCREEN ────────────────────────────────── */
  #screen-setup {
    background: radial-gradient(ellipse at 60% 30%, #f0e6d6 0%, var(--bg) 70%);
  }
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 28px 36px;
    max-width: 580px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(100,60,20,0.10);
  }
  .setup-title {
    font-size: 11px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .setup-heading {
    font-size: 20px;
    font-family: 'Noto Naskh Arabic', serif;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.3;
    direction: rtl;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
    margin-bottom: 16px;
  }
  .form-grid .field-group-full {
    grid-column: 1 / -1;
  }
  .field-group { margin-bottom: 0; }
  .field-label {
    display: block;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .field-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
    direction: ltr;
  }
  .field-input:focus { border-color: var(--accent); }

  .ordre-toggle { display: flex; gap: 8px; }
  .ordre-btn {
    flex: 1; padding: 8px 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .ordre-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

  .start-btn {
    width: 100%; padding: 13px;
    background: var(--accent);
    border: none; border-radius: 8px;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .2s, transform .1s;
  }
  .start-btn:hover { opacity: .9; transform: translateY(-1px); }
  .start-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

  /* ── TRIAL SCREEN ────────────────────────────────── */
  #screen-trial { background: var(--bg); }
  .trial-label {
    font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 32px;
  }
  .trial-words {
    display: flex; gap: 80px; align-items: center; justify-content: center;
    direction: rtl;
  }
  .trial-word {
    font-family: 'Noto Naskh Arabic', serif;
    font-size: 72px; font-weight: 400;
    color: var(--text);
    opacity: 0;
    animation: fadeUp .5s ease forwards;
  }
  .trial-word:nth-child(2) { animation-delay: .15s; }
  .trial-sep { color: var(--border); font-size: 48px; }
  .trial-sub {
    margin-top: 48px;
    font-size: 12px; letter-spacing: .1em; color: var(--muted);
    text-transform: uppercase;
  }
  .next-btn {
    margin-top: 56px;
    padding: 14px 48px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  .next-btn:hover { background: var(--accent); color: #fff; }

  /* ── BLOC SCREEN ─────────────────────────────────── */
  #screen-bloc {
    background: var(--bg);
    position: relative;
  }
  .bloc-topbar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .bloc-info { font-size: 12px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
  .bloc-info strong { color: var(--accent); }

  /* Timer hidden from child — only shown to technician via keyboard shortcut hint */
  .timer-hidden {
    font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: .05em;
    opacity: 0.4;
  }

  /* 4 columns × 2 rows — horizontal reading direction RTL */
  .grid-wrap {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    width: 100vw;
    height: calc(100vh - 56px);
    margin-top: 56px;
    background: var(--border);
    direction: rtl;
  }
  .word-cell {
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Naskh Arabic', serif;
    font-size: clamp(32px, 4.5vw, 58px);
    font-weight: 400;
    color: var(--text);
    cursor: default;
    opacity: 0;
    transition: opacity .3s ease;
    position: relative;
  }
  .word-cell.visible { opacity: 1; }



  /* ── END SCREEN ──────────────────────────────────── */
  #screen-end { background: var(--bg); }
  .end-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 28px 36px;
    max-width: 580px; width: 100%;
    box-shadow: 0 8px 32px rgba(100,60,20,0.10);
  }
  .end-title { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .end-heading { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 18px; }

  .end-summary {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 20px;
  }
  .end-stat {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .end-stat-val { font-size: 18px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; min-width: 32px; }
  .end-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

  .blocs-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12px; }
  .blocs-table th { text-align: left; color: var(--muted); font-weight: 400; letter-spacing: .08em; text-transform: uppercase; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  .blocs-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .blocs-table tr:last-child td { border-bottom: none; }

  .restart-btn {
    width: 100%; padding: 12px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; transition: border-color .2s, color .2s;
  }
  .restart-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── ANIMATIONS ──────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .6; }
  }

  /* ── TRANSITION OVERLAY ──────────────────────────── */
  #overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  #overlay.show { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<div id="overlay"></div>

<!-- ── SETUP ───────────────────────────────────────── -->
<div class="screen active" id="screen-setup">
  <div class="setup-card">
    <div class="setup-title">Tâche 5</div>
    <div class="setup-heading">قراءة شبه الكلمات المشكولة</div>

    <div class="form-grid">
      <!-- Col 1 : Enfant -->
      <div class="field-group">
        <label class="field-label">Code / Nom de l'enfant</label>
        <input class="field-input" id="input-enfant" type="text" placeholder="ex : Adam, Élève 03…" dir="ltr">
      </div>

      <!-- Col 2 : Classe -->
      <div class="field-group">
        <label class="field-label">Classe / Niveau</label>
        <input class="field-input" id="input-classe" type="text" placeholder="ex : CE2, 4ème…" dir="ltr">
      </div>

      <!-- Col 1 : Date -->
      <div class="field-group">
        <label class="field-label">Date de passation</label>
        <input class="field-input" id="input-date" type="date" dir="ltr">
      </div>

      <!-- Col 2 : Ordre -->
      <div class="field-group">
        <label class="field-label">Ordre de présentation</label>
        <div class="ordre-toggle">
          <button class="ordre-btn" id="btn-A" onclick="selectOrdre('A')">A</button>
          <button class="ordre-btn" id="btn-B" onclick="selectOrdre('B')">B</button>
        </div>
      </div>

      <!-- Full width : Groupe -->
      <div class="field-group field-group-full">
        <label class="field-label">Groupe de l'enfant</label>
        <div class="ordre-toggle">
          <button class="ordre-btn" id="btn-G-A" onclick="selectGroupe('A')">A</button>
          <button class="ordre-btn" id="btn-G-B" onclick="selectGroupe('B')">B</button>
          <button class="ordre-btn" id="btn-G-C" onclick="selectGroupe('C')">C</button>
          <button class="ordre-btn" id="btn-G-D" onclick="selectGroupe('D')">D</button>
        </div>
      </div>
    </div>

    <button class="start-btn" id="btn-start" onclick="startTask()" disabled>
      Lancer la passation →
    </button>
  </div>
</div>

<!-- ── TRIAL ───────────────────────────────────────── -->
<div class="screen" id="screen-trial">
  <div class="trial-words">
    <span class="trial-word">هَقَسَ</span>
    <span class="trial-sep">—</span>
    <span class="trial-word">زَطَفَ</span>
  </div>
  <button class="next-btn" onclick="startBlocs()">Commencer la tâche →</button>
</div>

<!-- ── FIXATION ─────────────────────────────────────── -->
<div class="screen" id="screen-fixation">
  <div style="font-size: 96px; font-weight: 300; color: var(--border); line-height:1;">+</div>
</div>


<div class="screen" id="screen-bloc">
  <div class="bloc-topbar">
    <div class="bloc-info">Bloc <strong id="bloc-num">1</strong> / 4</div>
    <div class="timer-hidden">⎵ Espace — arrêter le bloc</div>
    <div class="bloc-info">Ordre <strong id="ordre-label">A</strong></div>
  </div>
  <div class="grid-wrap" id="grid-wrap"></div>
</div>

<!-- ── END ─────────────────────────────────────────── -->
<div class="screen" id="screen-end">
  <div class="end-card">
    <div class="end-title">Tâche 5 — Résultats</div>
    <div class="end-heading">Passation terminée</div>
    <div class="end-summary">
      <div class="end-stat">
        <div class="end-stat-val" id="res-enfant" style="font-size:15px; min-width:auto;">—</div>
        <div class="end-stat-lbl">Enfant</div>
      </div>
      <div class="end-stat">
        <div class="end-stat-val" id="res-groupe">—</div>
        <div class="end-stat-lbl">Groupe</div>
      </div>
      <div class="end-stat">
        <div class="end-stat-val" id="res-classe" style="font-size:15px; min-width:auto;">—</div>
        <div class="end-stat-lbl">Classe</div>
      </div>
      <div class="end-stat">
        <div class="end-stat-val" id="res-ordre">—</div>
        <div class="end-stat-lbl">Ordre</div>
      </div>
      <div class="end-stat">
        <div class="end-stat-val" id="res-date" style="font-size:15px; min-width:auto;">—</div>
        <div class="end-stat-lbl">Date</div>
      </div>
      <div class="end-stat">
        <div class="end-stat-val" id="res-time">—</div>
        <div class="end-stat-lbl">Temps total (s)</div>
      </div>
    </div>

    <table class="blocs-table">
      <thead>
        <tr>
          <th>Bloc</th>
          <th>Items</th>
          <th>Temps (s)</th>
        </tr>
      </thead>
      <tbody id="blocs-tbody"></tbody>
    </table>

    <div id="sync-status" style="font-size:12px; text-align:center; margin-bottom:14px; min-height:18px;"></div>
    <button class="restart-btn" onclick="restart()">↺ Nouvelle passation</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
const LISTES = {
  A: [
    ['مَرَفَ','نَطَمَ','وَمَرَ','بَحَسَ','تَسَلَ','حَصَفَ','رَحَسَ','فَجَدَ'],
    ['لَرَفَ','دَرَفَ','شَجَدَ','قَرَمَ','عَحَسَ','غَطَمَ','زَحَسَ','ثَرَفَ'],
    ['مَصَفَ','نَشَقَ','وَشَقَ','بَحَدَ','تَطَمَ','حَشَقَ','رَحَدَ','فَمَرَ'],
    ['لَقَتَ','دَقَنَ','شَقَمَ','قَحَسَ','عَقَنَ','غَصَفَ','زَحَدَ','ثَمَکَ'],
  ],
  B: [
    ['قَرَمَ','لَرَفَ','غَطَمَ','دَرَفَ','ثَرَفَ','عَحَسَ','زَحَسَ','شَجَدَ'],
    ['بَحَسَ','مَرَفَ','تَسَلَ','نَطَمَ','حَصَفَ','وَمَرَ','فَجَدَ','رَحَسَ'],
    ['قَحَسَ','لَقَتَ','غَصَفَ','دَقَنَ','ثَمَکَ','عَقَنَ','زَحَدَ','شَقَمَ'],
    ['بَحَدَ','مَصَفَ','تَطَمَ','نَشَقَ','حَشَقَ','وَشَقَ','فَمَرَ','رَحَدَ'],
  ]
};

// ── STATE ─────────────────────────────────────────────────────────
let ordre = null;
let groupe = null;
let currentBloc = 0;
let timerInterval = null;
let timerStart = 0;
let timerElapsed = 0;
let blocResults = [];

// ── SETUP ─────────────────────────────────────────────────────────
document.getElementById('input-date').valueAsDate = new Date();

function selectOrdre(o) {
  ordre = o;
  document.getElementById('btn-A').classList.toggle('selected', o === 'A');
  document.getElementById('btn-B').classList.toggle('selected', o === 'B');
  checkReady();
}

function selectGroupe(g) {
  groupe = g;
  ['A','B','C','D'].forEach(x =>
    document.getElementById('btn-G-' + x).classList.toggle('selected', x === g)
  );
  checkReady();
}

document.getElementById('input-classe').addEventListener('input', checkReady);
document.getElementById('input-enfant').addEventListener('input', checkReady);

function checkReady() {
  const ready = ordre !== null
    && groupe !== null
    && document.getElementById('input-classe').value.trim() !== ''
    && document.getElementById('input-enfant').value.trim() !== '';
  document.getElementById('btn-start').disabled = !ready;
}

function startTask() {
  transition(() => {
    showScreen('screen-trial');
  });
}

// ── TRIAL ─────────────────────────────────────────────────────────
function startBlocs() {
  currentBloc = 0;
  blocResults = [];
  transition(() => {
    showBloc(currentBloc);
  });
}

// ── BLOC ──────────────────────────────────────────────────────────
function showBloc(idx) {
  document.getElementById('bloc-num').textContent = idx + 1;
  document.getElementById('ordre-label').textContent = ordre;
  showScreen('screen-bloc');

  const words = LISTES[ordre][idx];
  const grid = document.getElementById('grid-wrap');
  grid.innerHTML = '';

  words.forEach((w) => {
    const cell = document.createElement('div');
    cell.className = 'word-cell';
    cell.textContent = w;
    grid.appendChild(cell);
  });

  // Reset timer (internal only — not displayed)
  clearInterval(timerInterval);
  timerElapsed = 0;

  // Reveal cells with stagger, start timer on first cell
  const cells = grid.querySelectorAll('.word-cell');
  cells.forEach((cell, i) => {
    setTimeout(() => {
      cell.classList.add('visible');
      if (i === 0) {
        timerStart = performance.now();
        timerInterval = setInterval(() => {
          timerElapsed = (performance.now() - timerStart) / 1000;
        }, 50);
      }
    }, i * 60);
  });
}

function updateTimer() {
  timerElapsed = (performance.now() - timerStart) / 1000;
}

// Technicien appuie sur Espace pour stopper le bloc
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && currentScreen() === 'screen-bloc') {
    e.preventDefault();
    stopBloc();
  }
});

function stopBloc() {
  clearInterval(timerInterval);
  timerElapsed = (performance.now() - timerStart) / 1000;

  const t = parseFloat(timerElapsed.toFixed(2));
  blocResults.push({ bloc: currentBloc + 1, time: t });

  currentBloc++;

  if (currentBloc >= 4) {
    // Last bloc → fade to end
    const ov = document.getElementById('overlay');
    ov.classList.add('show');
    setTimeout(() => {
      showEnd();
      setTimeout(() => ov.classList.remove('show'), 200);
    }, 500);
  } else {
    // Show fixation cross for 500ms, then directly next bloc
    showScreen('screen-fixation');
    setTimeout(() => {
      const ov = document.getElementById('overlay');
      ov.classList.add('show');
      setTimeout(() => {
        showBloc(currentBloc);
        setTimeout(() => ov.classList.remove('show'), 200);
      }, 300);
    }, 500);
  }
}

// ── GOOGLE SHEETS SYNC ────────────────────────────────────────────
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwu14juhpZ_eg_PbI4E3jMOJ6x_yWh6X4nSPiPAduDNcW0u8yql13R66a3TWfy8AOxI/exec';

async function sendToSheet(data) {
  const statusEl = document.getElementById('sync-status');
  statusEl.textContent = '⏳ Envoi en cours…';
  statusEl.style.color = 'var(--muted)';
  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    });
    statusEl.textContent = '✅ Données envoyées vers Google Sheets';
    statusEl.style.color = 'var(--correct)';
  } catch (err) {
    statusEl.textContent = '⚠️ Échec de l\'envoi — vérifiez la connexion internet';
    statusEl.style.color = 'var(--wrong)';
  }
}

// ── END ───────────────────────────────────────────────────────────
function showEnd() {
  showScreen('screen-end');

  const totalTime = blocResults.reduce((s, b) => s + b.time, 0);
  const dateVal = document.getElementById('input-date').value;
  const classeVal = document.getElementById('input-classe').value.trim();
  const enfantVal = document.getElementById('input-enfant').value.trim();

  document.getElementById('res-enfant').textContent = enfantVal || '—';
  document.getElementById('res-groupe').textContent = groupe || '—';
  document.getElementById('res-classe').textContent = classeVal || '—';
  document.getElementById('res-time').textContent = totalTime.toFixed(2);
  document.getElementById('res-ordre').textContent = ordre;
  document.getElementById('res-date').textContent = dateVal || '—';

  const tbody = document.getElementById('blocs-tbody');
  tbody.innerHTML = '';
  blocResults.forEach(b => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${b.bloc}</td>
      <td>8</td>
      <td>${b.time.toFixed(2)}</td>
    `;
    tbody.appendChild(tr);
  });

  const trTotal = document.createElement('tr');
  trTotal.style.fontWeight = '600';
  trTotal.innerHTML = `
    <td>Total</td>
    <td>32</td>
    <td>${totalTime.toFixed(2)}</td>
  `;
  tbody.appendChild(trTotal);

  // ── Envoyer vers Google Sheets ──
  sendToSheet({
    enfant:  enfantVal,
    groupe:  groupe,
    classe:  classeVal,
    ordre:   ordre,
    date:    dateVal,
    b1:      blocResults[0]?.time.toFixed(2) ?? '',
    b2:      blocResults[1]?.time.toFixed(2) ?? '',
    b3:      blocResults[2]?.time.toFixed(2) ?? '',
    b4:      blocResults[3]?.time.toFixed(2) ?? '',
    total:   totalTime.toFixed(2)
  });
}

function restart() {
  ordre = null;
  groupe = null;
  currentBloc = 0;
  blocResults = [];
  document.getElementById('btn-A').classList.remove('selected');
  document.getElementById('btn-B').classList.remove('selected');
  ['A','B','C','D'].forEach(x => document.getElementById('btn-G-' + x).classList.remove('selected'));
  document.getElementById('input-classe').value = '';
  document.getElementById('input-enfant').value = '';
  document.getElementById('input-date').valueAsDate = new Date();
  document.getElementById('btn-start').disabled = true;
  transition(() => showScreen('screen-setup'));
}

// ── UTILS ─────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function currentScreen() {
  const s = document.querySelector('.screen.active');
  return s ? s.id : null;
}

function transition(cb) {
  const ov = document.getElementById('overlay');
  ov.classList.add('show');
  setTimeout(() => {
    cb();
    setTimeout(() => ov.classList.remove('show'), 150);
  }, 300);
}
</script>
</body>
